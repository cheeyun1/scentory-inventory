<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCENTORY 물품 입출고 체크</title>
  <style>
    :root {
      --purple: #534AB7;
      --purple-light: #EEF0FA;
      --purple-dark: #3C3489;
      --amber: #854F0B;
      --amber-light: #FAEEDA;
      --green: #1D9E75;
      --red: #E24B4A;
      --border: rgba(0,0,0,0.1);
      --bg: #fff;
      --bg2: #f7f7f5;
      --text: #1a1a1a;
      --text2: #666;
      --text3: #999;
      --radius: 8px;
      --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --border: rgba(255,255,255,0.1);
        --bg: #1c1c1e; --bg2: #2c2c2e;
        --text: #f5f5f5; --text2: #aaa; --text3: #666;
        --purple-light: #26215C; --amber-light: #412402;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    .app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 10px; }
    .title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .top-right { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .stage-tabs { display: flex; gap: 5px; flex-wrap: wrap; }
    .tab { padding: 6px 12px; border-radius: var(--radius); border: 0.5px solid var(--border); font-size: 12px; cursor: pointer; background: var(--bg); color: var(--text2); transition: all 0.15s; font-family: inherit; }
    .tab.active { background: var(--purple); color: #fff; border-color: var(--purple); }
    .btn { padding: 6px 12px; border-radius: var(--radius); border: 0.5px solid var(--border); font-size: 12px; cursor: pointer; background: var(--bg); color: var(--text2); display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; font-family: inherit; }
    .btn:hover { background: var(--bg2); }
    .btn.admin-on { background: var(--amber); color: #fff; border-color: var(--amber); }
    .btn.primary { background: var(--purple); color: #fff; border-color: var(--purple); }
    .sync-bar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg2); border-radius: var(--radius); margin-bottom: 1rem; border: 0.5px solid var(--border); font-size: 12px; color: var(--text2); }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; transition: background 0.3s; }
    .sync-dot.ok { background: var(--green); }
    .sync-dot.saving { background: #EF9F27; animation: blink 0.8s infinite; }
    .sync-dot.error { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .sync-bar .spacer { flex: 1; }
    .sync-bar .time { color: var(--text3); font-size: 11px; }
    .user-chip { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--purple-light); color: var(--purple-dark); cursor: pointer; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 1.2rem; }
    .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
    .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .stat-val { font-size: 20px; font-weight: 600; }
    .stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .stat-val.ok { color: var(--green); }
    .stat-val.warn { color: var(--red); }
    .info-bar { font-size: 12px; color: var(--text3); padding: 7px 12px; background: var(--bg2); border-radius: var(--radius); margin-bottom: 1rem; }
    .table-wrap { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1.2rem; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
    th { background: var(--purple); color: #fff; font-weight: 500; padding: 9px 8px; text-align: center; font-size: 12px; }
    th:first-child { text-align: left; }
    td { padding: 7px 8px; border-top: 0.5px solid var(--border); text-align: center; vertical-align: middle; }
    td:first-child { text-align: left; }
    tr:nth-child(even) td { background: var(--bg2); }
    .group-hdr td { background: var(--purple-light) !important; font-weight: 600; font-size: 11px; color: var(--purple-dark); padding: 5px 8px; }
    .group-hdr.adm td { background: var(--amber-light) !important; color: var(--amber); }
    .scent-badge { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 20px; margin-left: 4px; }
    .sc-s { background: #E3F2FD; color: #0C447C; }
    .sc-g { background: #E1F5EE; color: #085041; }
    .sc-f { background: #FBEAF0; color: #72243E; }
    .num-input { width: 62px; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 4px; text-align: center; font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; }
    .num-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(83,74,183,0.25); border-color: var(--purple); }
    .adm-input { width: 72px; border: 0.5px solid var(--amber); border-radius: var(--radius); padding: 4px; text-align: center; font-size: 12px; background: var(--amber-light); color: var(--amber); font-family: inherit; }
    .adm-name  { width: 120px; border: 0.5px solid var(--amber); border-radius: var(--radius); padding: 4px; font-size: 12px; background: var(--amber-light); color: var(--amber); font-family: inherit; }
    .adm-scent { width: 60px; border: 0.5px solid var(--amber); border-radius: var(--radius); padding: 4px; font-size: 12px; background: var(--amber-light); color: var(--amber); font-family: inherit; }
    .diff-pos { color: var(--green); font-weight: 600; }
    .diff-neg { color: var(--red); font-weight: 600; }
    .diff-zero { color: var(--text3); }
    .edit-who { font-size: 11px; color: var(--text3); }
    .del-btn { padding: 2px 6px; font-size: 11px; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--bg); color: var(--red); font-family: inherit; }
    .add-row-btn { width: 100%; padding: 6px; font-size: 12px; border: none; background: var(--amber-light); color: var(--amber); cursor: pointer; border-top: 0.5px solid var(--border); font-family: inherit; }
    .footer-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .adm-badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; background: var(--amber-light); color: var(--amber); }

    /* 모달 공통 */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 1.8rem; width: 300px; border: 0.5px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: .5rem; }
    .modal p  { font-size: 12px; color: var(--text2); margin-bottom: 14px; line-height: 1.6; }
    .modal input { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px; font-size: 15px; background: var(--bg); color: var(--text); margin-bottom: 10px; font-family: inherit; }
    .modal input:focus { outline: none; box-shadow: 0 0 0 2px rgba(83,74,183,0.25); border-color: var(--purple); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button { padding: 8px 18px; border-radius: var(--radius); font-size: 13px; cursor: pointer; border: 0.5px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; }
    .modal-btns .confirm { background: var(--purple); color: #fff; border-color: var(--purple); }
    .modal-err { font-size: 12px; color: var(--red); margin-bottom: 8px; }

    .loading { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="title">
      SCENTORY 물품 입출고
      <span class="adm-badge" id="adm-badge" style="display:none">관리자 모드</span>
    </div>
    <div class="top-right">
      <div class="stage-tabs">
        <button class="tab active" onclick="setStage(0)">입고 확인</button>
        <button class="tab" onclick="setStage(1)">1학교→2학교</button>
        <button class="tab" onclick="setStage(2)">2학교→3학교</button>
        <button class="tab" onclick="setStage(3)">3학교 종료</button>
      </div>
      <button class="btn" id="adm-btn" onclick="toggleAdmin()">⚙ 관리자</button>
    </div>
  </div>

  <div class="sync-bar">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-label">연결 중...</span>
    <span class="spacer"></span>
    <span class="user-chip" id="user-chip" onclick="changeName()" title="이름 변경"></span>
    <span class="time" id="sync-time"></span>
  </div>

  <div id="loading-block" class="loading">
    <div class="spinner"></div>
    데이터 불러오는 중...
  </div>

  <div id="main-content" style="display:none">
    <div class="summary-grid" id="summary"></div>
    <div class="info-bar" id="info-bar"></div>
    <div class="table-wrap">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
    <div class="footer-row">
      <button class="btn primary" onclick="exportCSV()">↓ CSV 내보내기</button>
      <button class="btn" id="reset-btn" style="display:none;color:var(--red)" onclick="confirmReset()">✕ 데이터 초기화</button>
    </div>
  </div>
</div>

<!-- 이름 입력 모달 (첫 접속 / 이름 변경) -->
<div class="overlay" id="modal-name">
  <div class="modal">
    <h3>👋 안녕하세요!</h3>
    <p>수정 내역에 표시될 이름을 입력해주세요.</p>
    <input type="text" id="name-input" placeholder="예: 희윤" maxlength="10" onkeydown="if(event.key==='Enter')confirmName()">
    <div class="modal-err" id="name-err" style="display:none">이름을 입력해주세요</div>
    <div class="modal-btns">
      <button class="confirm" onclick="confirmName()">시작하기</button>
    </div>
  </div>
</div>

<!-- 관리자 비밀번호 모달 -->
<div class="overlay" id="modal-pw" style="display:none">
  <div class="modal">
    <h3>🔒 관리자 코드 입력</h3>
    <input type="password" id="pw-input" placeholder="관리자 코드" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="modal-err" id="pw-err" style="display:none">코드가 올바르지 않아요</div>
    <div class="modal-btns">
      <button onclick="closePwModal()">취소</button>
      <button class="confirm" onclick="checkPw()">확인</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }                  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://scentory-inventory-default-rtdb.firebaseio.com"
};
const db   = getDatabase(initializeApp(firebaseConfig));
const ROOT = ref(db, 'inventory');

/* ── 기본 물품 데이터 ── */
const DEFAULT_GROUPS = [
  { group: "Step 1 · 향 추천", items: [
      { name: "QR코드 출력물",  scent: null, total: 3   },
      { name: "시향 도구 (천)", scent: null, total: 9   },
  ]},
  { group: "Step 1 · 미니캡슐세제 샘플", items: [
      { name: "미니캡슐세제", scent: "썸머",    total: 700 },
      { name: "미니캡슐세제", scent: "그리너리", total: 650 },
      { name: "미니캡슐세제", scent: "플로럴",  total: 650 },
  ]},
  { group: "Step 2 · 시향+엽서", items: [
      { name: "엽서",      scent: null, total: 1800 },
      { name: "펜",        scent: null, total: 24   },
      { name: "집게",      scent: null, total: 150  },
      { name: "트와인끈",  scent: null, total: 1    },
  ]},
  { group: "Step 3 · 럭키드로우", items: [
      { name: "아크릴볼", scent: null, total: 2100 },
  ]},
  { group: "Step 3 · 1등", items: [
      { name: "섬유향수 300ml", scent: "썸머",    total: 4 },
      { name: "섬유향수 300ml", scent: "그리너리", total: 3 },
      { name: "섬유향수 300ml", scent: "플로럴",  total: 3 },
  ]},
  { group: "Step 3 · 2등", items: [
      { name: "섬유향수 90ml", scent: "썸머",    total: 39 },
      { name: "섬유향수 90ml", scent: "그리너리", total: 39 },
      { name: "섬유향수 90ml", scent: "플로럴",  total: 39 },
  ]},
  { group: "Step 3 · 3등", items: [
      { name: "캡슐세제 세트 2개입", scent: "그리너리", total: 700 },
      { name: "캡슐세제 세트 2개입", scent: "플로럴",  total: 400 },
  ]},
  { group: "기타", items: [
      { name: "버블건",     scent: null, total: 3    },
      { name: "스티커",    scent: null, total: 255  },
      { name: "미니 지퍼백",scent: null, total: 2100 },
  ]},
];

const SCENT_CLASS = { "썸머":"sc-s", "그리너리":"sc-g", "플로럴":"sc-f" };
const STAGE_INFO  = [
  "첫날 물품 도착 후 기준 수량과 비교해 입고 확인 수량을 입력하세요.",
  "서울시립대 종료 후 다음 학교로 이관할 수량을 입력하세요.",
  "한양대 종료 후 상명대로 이관할 수량을 입력하세요.",
  "상명대 행사 종료 후 최종 잔여 수량을 입력하세요.",
];
const STAGES = [
  { inCol:"기준 수량",     outCol:"입고 확인", diffLabel:"차이"       },
  { inCol:"이관 전 재고",  outCol:"이관 수량", diffLabel:"1학교 사용" },
  { inCol:"이관 전 재고",  outCol:"이관 수량", diffLabel:"2학교 사용" },
  { inCol:"이관받은 재고", outCol:"최종 잔여", diffLabel:"3학교 사용" },
];
const ADMIN_CODE = '2026';

let GROUPS    = JSON.parse(JSON.stringify(DEFAULT_GROUPS));
let vals      = [];
let editedBy  = []; // editedBy[i][stage] = "이름"
let stage     = 0;
let isAdmin   = false;
let saveTimer = null;
let isSaving  = false;
let ignoreNext= false;
let myName    = '';

const flatItems = () => GROUPS.flatMap(g => g.items);

function initVals() {
  const n = flatItems().length;
  vals     = Array.from({length:n}, () => [null,null,null,null]);
  editedBy = Array.from({length:n}, () => ['','','','']);
}
initVals();

const toSafe   = v => v === null ? -1 : v;
const fromSafe = v => v === -1   ? null : v;

function buildPayload() {
  return {
    groups:   GROUPS,
    vals:     vals.map(r => r.map(toSafe)),
    editedBy: editedBy,
    savedAt:  Date.now()
  };
}

function applyData(data) {
  if (!data) return;
  if (data.groups) GROUPS = data.groups;
  const n = flatItems().length;
  if (data.vals) {
    vals = data.vals.map(r => Array.isArray(r) ? r.map(fromSafe) : [null,null,null,null]);
    while (vals.length < n) vals.push([null,null,null,null]);
    vals = vals.slice(0, n);
  }
  if (data.editedBy) {
    editedBy = data.editedBy.slice(0, n);
    while (editedBy.length < n) editedBy.push(['','','','']);
  }
}

/* ── Firebase 리스너 ── */
onValue(ROOT, snap => {
  if (ignoreNext) { ignoreNext = false; return; }
  const data = snap.val();
  if (data) { applyData(data); }
  else { saveToFirebase(); }
  document.getElementById('loading-block').style.display = 'none';
  document.getElementById('main-content').style.display  = 'block';
  setSyncStatus('ok', '실시간 동기화 중');
  render();
}, () => {
  setSyncStatus('error', '연결 오류 — 새로고침 해주세요');
  document.getElementById('loading-block').innerHTML =
    '<p style="color:var(--red);font-size:13px">연결 실패. 페이지를 새로고침 해주세요.</p>';
});

async function saveToFirebase() {
  if (isSaving) return;
  isSaving = true; ignoreNext = true;
  setSyncStatus('saving', '저장 중...');
  try {
    await set(ROOT, buildPayload());
    setSyncStatus('ok', '저장됨');
    updateTime(Date.now());
  } catch {
    ignoreNext = false;
    setSyncStatus('error', '저장 실패');
  }
  isSaving = false;
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 800);
}

/* ── 이름 처리 ── */
function askName() {
  document.getElementById('modal-name').style.display = 'flex';
  setTimeout(() => document.getElementById('name-input').focus(), 50);
}

window.confirmName = () => {
  const v = document.getElementById('name-input').value.trim();
  if (!v) { document.getElementById('name-err').style.display = 'block'; return; }
  myName = v;
  localStorage.setItem('scentory_name', myName);
  document.getElementById('modal-name').style.display = 'none';
  document.getElementById('name-input').value = '';
  document.getElementById('name-err').style.display = 'none';
  document.getElementById('user-chip').textContent = '👤 ' + myName;
};

window.changeName = () => {
  document.getElementById('name-input').value = myName;
  document.getElementById('modal-name').style.display = 'flex';
  setTimeout(() => document.getElementById('name-input').focus(), 50);
};

/* ── UI 헬퍼 ── */
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot'+(state==='ok'?' ok':state==='saving'?' saving':state==='error'?' error':'');
  document.getElementById('sync-label').textContent = label;
}
function updateTime(ts) {
  const d = new Date(ts), p = n => String(n).padStart(2,'0');
  document.getElementById('sync-time').textContent =
    `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())} 저장`;
}
function getInVal(i) {
  if (stage===0) return flatItems()[i].total;
  return vals[i]?.[stage-1] ?? 0;
}

/* ── 렌더 ── */
function render() {
  document.getElementById('info-bar').textContent = STAGE_INFO[stage];
  const st = STAGES[stage];
  document.getElementById('thead').innerHTML = `<tr>
    <th>물품명</th>
    <th style="width:80px">${st.inCol}</th>
    <th style="width:80px">${st.outCol}</th>
    <th style="width:72px">${st.diffLabel}</th>
    <th style="width:72px">수정자</th>
    ${isAdmin ? '<th style="width:36px"></th>' : ''}
  </tr>`;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let fi = 0;

  GROUPS.forEach((group, gi) => {
    const ghTr = document.createElement('tr');
    ghTr.className = 'group-hdr'+(isAdmin?' adm':'');
    ghTr.innerHTML = `<td colspan="${isAdmin?6:5}">${group.group}</td>`;
    tbody.appendChild(ghTr);

    group.items.forEach((item, ii) => {
      const i      = fi++;
      const inVal  = getInVal(i);
      const outVal = vals[i]?.[stage] ?? null;
      const diff   = outVal !== null ? outVal - inVal : null;
      const dCls   = diff===null?'':diff>0?'diff-pos':diff<0?'diff-neg':'diff-zero';
      const dTxt   = diff===null?'-':(diff>0?'+'+diff:String(diff));
      const badge  = item.scent ? `<span class="scent-badge ${SCENT_CLASS[item.scent]||''}">${item.scent}</span>` : '';
      const who    = editedBy[i]?.[stage] || '-';
      const row    = document.createElement('tr');

      if (isAdmin) {
        row.innerHTML = `
          <td>
            <input class="adm-name"  value="${item.name}"       onchange="updateName(${gi},${ii},this.value)">
            <input class="adm-scent" value="${item.scent||''}"  placeholder="향" onchange="updateScent(${gi},${ii},this.value)">
          </td>
          <td><input class="adm-input" type="number" min="0" value="${item.total}" onchange="updateTotal(${gi},${ii},this.value)"></td>
          <td><input class="num-input" type="number" min="0" value="${outVal!==null?outVal:''}" placeholder="-" data-idx="${i}" oninput="updateVal(this)"></td>
          <td class="${dCls}" id="diff-${i}">${dTxt}</td>
          <td class="edit-who" id="who-${i}">${who}</td>
          <td><button class="del-btn" onclick="deleteItem(${gi},${ii})">✕</button></td>`;
      } else {
        row.innerHTML = `
          <td><span style="font-weight:500">${item.name}</span>${badge}</td>
          <td>${inVal}</td>
          <td><input class="num-input" type="number" min="0" value="${outVal!==null?outVal:''}" placeholder="-" data-idx="${i}" oninput="updateVal(this)"></td>
          <td class="${dCls}" id="diff-${i}">${dTxt}</td>
          <td class="edit-who" id="who-${i}">${who}</td>`;
      }
      tbody.appendChild(row);
    });

    if (isAdmin) {
      const addTr = document.createElement('tr');
      addTr.innerHTML = `<td colspan="6" style="padding:0"><button class="add-row-btn" onclick="addItem(${gi})">+ 항목 추가</button></td>`;
      tbody.appendChild(addTr);
    }
  });
  renderSummary();
}

function renderSummary() {
  const fl      = flatItems();
  const filled  = vals.filter(v => v[stage] !== null).length;
  const anomaly = vals.filter((v,i) => v[stage]!==null && (stage===0?v[stage]!==getInVal(i):v[stage]>getInVal(i))).length;
  const editors = [...new Set(editedBy.map(e=>e[stage]).filter(Boolean))];
  document.getElementById('summary').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">입력 완료</div>
      <div class="stat-val">${filled} / ${fl.length}</div>
      <div class="stat-sub">항목</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">수량 이상</div>
      <div class="stat-val ${anomaly>0?'warn':'ok'}">${anomaly}</div>
      <div class="stat-sub">${stage===0?'기준 불일치':'초과 항목'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">편집자</div>
      <div class="stat-val" style="font-size:12px;padding-top:5px">${editors.length?editors.slice(0,3).join(', '):'-'}</div>
      <div class="stat-sub">이번 단계</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">현재 단계</div>
      <div class="stat-val" style="font-size:12px;padding-top:5px">${['입고 확인','1→2학교','2→3학교','3학교 종료'][stage]}</div>
    </div>`;
}

/* ── 전역 함수 ── */
window.setStage = s => {
  stage = s;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',i===s));
  render();
};
window.toggleAdmin = () => {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('adm-btn').classList.remove('admin-on');
    document.getElementById('adm-badge').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';
    render();
  } else {
    document.getElementById('modal-pw').style.display = 'flex';
    setTimeout(() => document.getElementById('pw-input').focus(), 50);
  }
};
window.checkPw = () => {
  if (document.getElementById('pw-input').value === ADMIN_CODE) {
    isAdmin = true; closePwModal();
    document.getElementById('adm-btn').classList.add('admin-on');
    document.getElementById('adm-badge').style.display = 'inline';
    document.getElementById('reset-btn').style.display = 'inline-flex';
    render();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
};
window.closePwModal = () => {
  document.getElementById('modal-pw').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-err').style.display = 'none';
};
window.updateVal = el => {
  const i = parseInt(el.dataset.idx);
  if (!vals[i]) vals[i] = [null,null,null,null];
  vals[i][stage] = el.value==='' ? null : parseInt(el.value);
  if (!editedBy[i]) editedBy[i] = ['','','',''];
  editedBy[i][stage] = myName;
  const diff = vals[i][stage]!==null ? vals[i][stage]-getInVal(i) : null;
  const td = document.getElementById('diff-'+i);
  if (td) {
    td.className = diff===null?'':diff>0?'diff-pos':diff<0?'diff-neg':'diff-zero';
    td.textContent = diff===null?'-':(diff>0?'+'+diff:String(diff));
  }
  const whoEl = document.getElementById('who-'+i);
  if (whoEl) whoEl.textContent = myName || '-';
  renderSummary();
  scheduleSave();
};
window.updateName  = (gi,ii,v) => { GROUPS[gi].items[ii].name  = v;             scheduleSave(); };
window.updateScent = (gi,ii,v) => { GROUPS[gi].items[ii].scent = v||null;        scheduleSave(); };
window.updateTotal = (gi,ii,v) => { GROUPS[gi].items[ii].total = parseInt(v)||0; render(); scheduleSave(); };
window.deleteItem  = (gi,ii)   => { GROUPS[gi].items.splice(ii,1); rebuildVals(); render(); saveToFirebase(); };
window.addItem     = gi        => { GROUPS[gi].items.push({name:'새 항목',scent:null,total:0}); rebuildVals(); render(); saveToFirebase(); };

function rebuildVals() {
  const n = flatItems().length;
  while (vals.length < n)     vals.push([null,null,null,null]);
  while (editedBy.length < n) editedBy.push(['','','','']);
  vals     = vals.slice(0,n);
  editedBy = editedBy.slice(0,n);
}

window.exportCSV = () => {
  const st = STAGES[stage], fl = flatItems();
  let csv = `물품명,향,${st.inCol},${st.outCol},${st.diffLabel},수정자\n`;
  fl.forEach((item,i) => {
    const iv = getInVal(i), ov = vals[i]?.[stage]??'';
    csv += `"${item.name}","${item.scent||''}",${iv},${ov},${ov!==''?ov-iv:''},"${editedBy[i]?.[stage]||''}"\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `SCENTORY_${['입고','1학교','2학교','3학교'][stage]}.csv`;
  a.click();
};

window.confirmReset = async () => {
  if (!confirm('공유 데이터를 모두 초기화할까요?\n입력된 수량이 전부 삭제됩니다.')) return;
  GROUPS = JSON.parse(JSON.stringify(DEFAULT_GROUPS));
  initVals();
  await saveToFirebase();
  render();
};

/* ── 시작: 이름 확인 ── */
const saved = localStorage.getItem('scentory_name');
if (saved) {
  myName = saved;
  document.getElementById('user-chip').textContent = '👤 ' + myName;
  document.getElementById('modal-name').style.display = 'none';
} else {
  askName();
}
</script>
</body>
</html>
